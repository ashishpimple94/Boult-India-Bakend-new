<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostinger CORS Test</title>
</head>
<body>
    <h1>Hostinger Backend Connection Test</h1>
    <button onclick="testBackend()">Test Backend Connection</button>
    <button onclick="testRazorpay()">Test Razorpay Endpoint</button>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');
        
        function log(message) {
            results.innerHTML += '<p>' + message + '</p>';
            console.log(message);
        }

        async function testBackend() {
            results.innerHTML = '';
            log('🔄 Testing backend connection...');
            
            try {
                const response = await fetch('https://boult-india-bakend-new.onrender.com/health');
                const data = await response.json();
                log('✅ Backend connected: ' + data.status);
            } catch (error) {
                log('❌ Backend error: ' + error.message);
                log('🔍 This is likely a CORS issue!');
            }
        }

        async function testRazorpay() {
            log('🔄 Testing Razorpay endpoint...');
            
            try {
                const response = await fetch('https://boult-india-bakend-new.onrender.com/api/razorpay/create-order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        amount: 100,
                        orderId: 'TEST_' + Date.now(),
                        customer: 'Test User'
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log('✅ Razorpay endpoint working: ' + data.order.id);
                } else {
                    log('❌ Razorpay failed: ' + response.status);
                }
            } catch (error) {
                log('❌ Razorpay error: ' + error.message);
                log('🔍 CORS issue - domain not whitelisted!');
            }
        }

        // Auto-test on load
        window.onload = function() {
            log('🌐 Current domain: ' + window.location.origin);
            log('📍 Upload this file to your Hostinger domain and test');
        };
    </script>
</body>
</html>
