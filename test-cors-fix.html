<!DOCTYPE html>
<html>
<head>
    <title>Test CORS Fix</title>
</head>
<body>
    <h1>Testing CORS Fix for login.boultindia.com</h1>
    <button onclick="testAPI()">Test Orders API</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing CORS fix...';
            
            try {
                // Test with explicit origin header
                const response = await fetch('https://boult-india-bakend-new.onrender.com/api/orders', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Origin': 'https://login.boultindia.com'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <h2>✅ CORS FIXED!</h2>
                    <p><strong>Orders Count:</strong> ${data.count}</p>
                    <p><strong>Backend Response:</strong></p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                    <p><strong>Now your admin panel will work!</strong></p>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <h2>❌ Still CORS Error</h2>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p>Backend is still deploying... wait 2 minutes and try again.</p>
                `;
            }
        }
        
        // Auto test every 30 seconds
        setInterval(testAPI, 30000);
        setTimeout(testAPI, 2000);
    </script>
</body>
</html>
