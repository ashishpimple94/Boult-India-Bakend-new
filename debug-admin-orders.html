<!DOCTYPE html>
<html>
<head>
    <title>Debug Admin Orders</title>
</head>
<body>
    <h1>Debug Admin Orders API</h1>
    <button onclick="testOrders()">Test Orders API</button>
    <div id="result"></div>

    <script>
        async function testOrders() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                console.log('Testing backend API...');
                
                const response = await fetch('https://boult-india-bakend-new.onrender.com/api/orders', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Origin': window.location.origin
                    }
                });
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('Response data:', data);
                
                resultDiv.innerHTML = `
                    <h2>✅ SUCCESS!</h2>
                    <p><strong>Orders Count:</strong> ${data.count}</p>
                    <p><strong>Orders:</strong></p>
                    <pre>${JSON.stringify(data.orders, null, 2)}</pre>
                `;
                
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `
                    <h2>❌ ERROR!</h2>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p>Check browser console for details.</p>
                `;
            }
        }
        
        // Auto test on load
        window.onload = () => {
            setTimeout(testOrders, 1000);
        };
    </script>
</body>
</html>
